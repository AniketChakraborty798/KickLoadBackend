version: "3.9"

# ALB/ACM deployment compose:
# - No TLS in containers (ALB terminates HTTPS)
# - No nginx-proxy
# - No Jenkins (day-1)
#
# Run:
#   docker compose -f docker-compose.alb.yml up -d --build

services:
  flask_app:
    build:
      context: .
    container_name: flask_app
    command: gunicorn -k gevent --workers=1 --timeout=120 -b 0.0.0.0:5000 app:app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - FLASK_APP=app.py
      - PYTHONUNBUFFERED=1
      - INFLUX_URL=${INFLUX_URL:-http://influxdb:8086}
      - INFLUX_ORG=${INFLUX_ORG:-kickload}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-kickload}
      - INFLUX_TOKEN=${INFLUX_TOKEN:-}
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost', 5000))"]
      interval: 45s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  mongo:
    image: mongo:6.0
    container_name: mongo
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    ports:
      - "127.0.0.1:27017:27017"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  redis:
    image: redis:7.2-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "2m"
        max-file: "1"

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "127.0.0.1:8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME:-kickload}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-kickload12345}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-kickload}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-kickload}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN:-kickload-local-dev-token}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  telegraf:
    image: telegraf:1.30
    container_name: telegraf
    restart: unless-stopped
    environment:
      - INFLUXDB_ORG=${INFLUXDB_ORG:-kickload}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-kickload}
      - INFLUXDB_TOKEN=${INFLUX_TOKEN:-kickload-local-dev-token}
    volumes:
      - ./observability_stack/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    depends_on:
      - influxdb
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  grafana:
    image: grafana/grafana:11.3.1
    container_name: grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GRAFANA_LOCAL_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_USERS_ALLOW_SIGN_UP=false
      # Enable server-side panel rendering (for PDF embedding)
      - GF_RENDERING_SERVER_URL=http://grafana_renderer:8081/render
      - GF_RENDERING_CALLBACK_URL=http://grafana:3000/
      - INFLUXDB_ORG=${INFLUXDB_ORG:-kickload}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-kickload}
      - INFLUXDB_TOKEN=${INFLUX_TOKEN:-kickload-local-dev-token}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability_stack/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability_stack/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - influxdb
      - grafana_renderer
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  grafana_renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: grafana_renderer
    restart: unless-stopped
    environment:
      - ENABLE_METRICS=true
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  celery_worker:
    build:
      context: .
    container_name: celery_worker
    command: python -m celery -A tasks.celery worker --loglevel=info --queues=celery,jmeter,scheduler,gemini
    env_file:
      - .env
    depends_on:
      - flask_app
      - mongo
      - redis
    volumes:
      - /home/ec2-user/jmeter-data:/app/data
      - /opt/apache-jmeter-5.6.3:/opt/apache-jmeter-5.6.3
      - /usr/lib/jvm/java-17-amazon-corretto:/usr/lib/jvm/java-17-amazon-corretto
      - /usr/bin/curl:/usr/bin/curl:ro
    environment:
      - JAVA_HOME=/usr/lib/jvm/java-17-amazon-corretto
      - PYTHONUNBUFFERED=1
      - INFLUX_URL=${INFLUX_URL:-http://influxdb:8086}
      - INFLUX_ORG=${INFLUX_ORG:-kickload}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-kickload}
      - INFLUX_TOKEN=${INFLUX_TOKEN:-}
    restart: unless-stopped

  celery_beat:
    build:
      context: .
    container_name: celery_beat
    command: python -m celery -A tasks.celery beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - flask_app
    restart: unless-stopped

volumes:
  mongo_data:
  influxdb_data:
  influxdb_config:
  grafana_data:

